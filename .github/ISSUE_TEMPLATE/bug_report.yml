name: Bug report
description: Report a tool that doesn't work as expected
labels: [bug]
body:
  - type: input
    id: tool
    attributes:
      label: Affected tool
      description: Which evtool command has the issue?
      placeholder: evtool csv-analyze
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include error output.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Exact commands you ran
      placeholder: |
        pip install evolver-tools
        evtool csv-analyze myfile.csv
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `evtool version`
      placeholder: evolver-tools 38.0.1
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: Ubuntu 24.04, macOS 14, Windows 11...
    validations:
      required: true
