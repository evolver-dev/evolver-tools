name: Feature request
description: Suggest a new tool or enhancement
labels: [enhancement]
body:
  - type: dropdown
    id: type
    attributes:
      label: Request type
      options:
        - New CLI tool
        - Enhancement to existing tool
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem would this solve?
      placeholder: "I often need to..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should the tool work?
      placeholder: "evtool <name> [options] [args]"
    validations:
      required: true
  - type: textarea
    id: example
    attributes:
      label: Example usage
      description: Show what the command should look like
      placeholder: |
        $ evtool my-new-tool --input file.txt
        # expected output...
    validations:
      required: false
