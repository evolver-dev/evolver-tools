  <text x="18" y="462" fill="#00d4aa" font-family="'SF Mono','Fira Code',monospace" font-size="11">▒ ▒▓▒ ▒ ░░ ▒░▓  ░  ░ ▐░   ░▒▓▒ ▒ ▒ ░ ▒░▓  ░░ ▒░▓  ░ ▒▓ ░▒▓░</text>
