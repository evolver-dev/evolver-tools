  <text x="18" y="200" fill="#00bcd4" font-family="'SF Mono','Fira Code',monospace" font-size="12">║ date           datetime  1,247   0      ║</text>
  <text x="18" y="216" fill="#b3c7e5" font-family="'SF Mono','Fira Code',monospace" font-size="12">║ product        string    42      0      ║</text>
  <text x="18" y="232" fill="#b3c7e5" font-family="'SF Mono','Fira Code',monospace" font-size="12">║ category       string     8      0      ║</text>
  <text x="18" y="248" fill="#b3c7e5" font-family="'SF Mono','Fira Code',monospace" font-size="12">║ price          float    234      3      ║</text>
  <text x="18" y="264" fill="#b3c7e5" font-family="'SF Mono','Fira Code',monospace" font-size="12">║ quantity       int       12      0      ║</text>
