<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" width="800" height="540">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'Fira Code', monospace; }
    </style>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1b26"/>
      <stop offset="100%" stop-color="#0f0f18"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Window frame -->
  <rect x="0" y="0" width="800" height="540" fill="url(#bg)" rx="8"/>
  <rect x="0" y="0" width="800" height="32" fill="#2a2b3d" rx="8"/>
  <rect x="0" y="16" width="800" height="16" fill="#2a2b3d"/>

  <!-- Window buttons -->
  <circle cx="24" cy="16" r="5" fill="#ff5f56"/>
  <circle cx="44" cy="16" r="5" fill="#ffbd2e"/>
  <circle cx="64" cy="16" r="5" fill="#27c93f"/>

  <!-- Title -->
  <text x="400" y="20" text-anchor="middle" fill="#565f89" font-size="12">evolver-tools — 260 CLI tools, zero dependencies</text>

  <!-- Terminal content -->
  <text x="24" y="60" fill="#565f89" font-size="13">$ </text>
  <text x="42" y="60" fill="#a9b1d6" font-size="13">pip install evolver-tools</text>

  <text x="24" y="82" fill="#565f89" font-size="13">$ </text>
  <text x="42" y="82" fill="#bb9af7" font-size="13">evtool</text>
  <text x="80" y="82" fill="#a9b1d6" font-size="13">list</text>

  <!-- Tool output -->
  <text x="24" y="108" fill="#565f89" font-size="12">  260 tools available:</text>

  <text x="24" y="128" fill="#9ece6a" font-size="12">  csv-stats</text>
  <text x="120" y="128" fill="#565f89" font-size="11">— CSV statistical analysis (mean, std, median, distribution)</text>

  <text x="24" y="148" fill="#9ece6a" font-size="12">  json-pretty</text>
  <text x="120" y="148" fill="#565f89" font-size="11">— Pretty-print JSON with syntax highlighting</text>

  <text x="24" y="168" fill="#9ece6a" font-size="12">  siege-lite</text>
  <text x="120" y="168" fill="#565f89" font-size="11">— HTTP load testing with latency percentiles</text>

  <text x="24" y="188" fill="#9ece6a" font-size="12">  sysmon</text>
  <text x="120" y="188" fill="#565f89" font-size="11">— Real-time system monitor (curses dashboard)</text>

  <text x="24" y="208" fill="#9ece6a" font-size="12">  ren</text>
  <text x="120" y="208" fill="#565f89" font-size="11">— Batch file rename with preview and undo support</text>

  <text x="24" y="228" fill="#9ece6a" font-size="12">  smellfinder</text>
  <text x="120" y="228" fill="#565f89" font-size="11">— Python code smell detector (AST-based)</text>

  <text x="24" y="248" fill="#9ece6a" font-size="12">  ascii-banner</text>
  <text x="120" y="248" fill="#565f89" font-size="11">— Generate large ASCII art banners</text>

  <text x="24" y="268" fill="#9ece6a" font-size="12">  project-doctor</text>
  <text x="120" y="268" fill="#565f89" font-size="11">— Project health check (metadata, structure, code)</text>

  <text x="24" y="288" fill="#9ece6a" font-size="12">  chart-cli</text>
  <text x="120" y="288" fill="#565f89" font-size="11">— Terminal bar/line/pie charts (Unicode blocks)</text>

  <text x="24" y="308" fill="#9ece6a" font-size="12">  ... and 250+ more</text>

  <!-- Demo section -->
  <text x="24" y="348" fill="#565f89" font-size="13">$ </text>
  <text x="42" y="348" fill="#bb9af7" font-size="13">evtool</text>
  <text x="80" y="348" fill="#a9b1d6" font-size="13">csv-stats sales.csv</text>

  <text x="24" y="372" fill="#7aa2f7" font-size="12">  📊 CSV Analysis Report</text>
  <text x="24" y="390" fill="#565f89" font-size="11">    File: sales.csv | Rows: 1,247 | Columns: 8</text>
  <text x="24" y="406" fill="#565f89" font-size="11">    revenue (float)    Mean: $47,829    Std: $12,304</text>
  <text x="24" y="422" fill="#565f89" font-size="11">    region (text)      4 unique values</text>

  <!-- Footer -->
  <text x="24" y="470" fill="#565f89" font-size="13">$ </text>
  <text x="42" y="470" fill="#bb9af7" font-size="13">evtool</text>
  <text x="80" y="470" fill="#a9b1d6" font-size="13">sysmon</text>

  <!-- Status bar -->
  <rect x="0" y="508" width="800" height="32" fill="#1a1b26"/>
  <text x="24" y="528" fill="#565f89" font-size="11">⚡ MIT License  •  260 tools  •  Linux / macOS / Windows  •  Python 3.8+</text>
  <text x="400" y="528" text-anchor="end" fill="#565f89" font-size="11">evolver-dev.github.io/evolver-tools</text>
</svg>
