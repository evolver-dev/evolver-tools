<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono');
      text { font-family: 'JetBrains Mono', 'Courier New', monospace; }
    </style>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  
  <!-- Window frame -->
  <rect x="10" y="10" width="780" height="580" rx="8" fill="#1a1b26" stroke="#414868" stroke-width="2"/>
  
  <!-- Title bar -->
  <rect x="10" y="10" width="780" height="36" rx="8" fill="#24283b"/>
  <rect x="10" y="28" width="780" height="18" fill="#24283b"/>
  
  <!-- Window buttons -->
  <circle cx="36" cy="28" r="6" fill="#f7768e"/>
  <circle cx="56" cy="28" r="6" fill="#e0af68"/>
  <circle cx="76" cy="28" r="6" fill="#7dcfff"/>
  
  <!-- Title text -->
  <text x="400" y="33" text-anchor="middle" fill="#a9b1d6" font-size="12">evolver-tools — evtool terminal</text>
  
  <!-- Terminal content -->
  <!-- Line 1: Header -->
  <text x="24" y="70" fill="#7aa2f7" font-size="13" font-weight="bold">=== EVOLVER Tools v38.0.5 ===</text>
  
  <!-- Line 2 -->
  <text x="24" y="92" fill="#a9b1d6" font-size="13">259 CLI tools, zero dependencies.</text>
  
  <!-- Line 3: Empty -->
  
  <!-- Line 4: Prompt + command -->
  <text x="24" y="114" fill="#73daca" font-size="13">$</text>
  <text x="38" y="114" fill="#c0caf5" font-size="13"> </text>
  <text x="42" y="114" fill="#e0af68" font-size="13">evtool list</text>
  <text x="130" y="114" fill="#565f89" font-size="11">| head -15</text>
  
  <!-- Tool listing -->
  <text x="24" y="136" fill="#bb9af7" font-size="12">  agent-b-tool</text>
  <text x="160" y="136" fill="#a9b1d6" font-size="11">Dual-agent collaborative workflow tool</text>
  
  <text x="24" y="154" fill="#bb9af7" font-size="12">  ansi-strip</text>
  <text x="160" y="154" fill="#a9b1d6" font-size="11">Strip ANSI escape codes</text>
  
  <text x="24" y="172" fill="#bb9af7" font-size="12">  ansi-to-html</text>
  <text x="160" y="172" fill="#a9b1d6" font-size="11">Convert ANSI to HTML</text>
  
  <text x="24" y="190" fill="#bb9af7" font-size="12">  ascii-banner</text>
  <text x="160" y="190" fill="#a9b1d6" font-size="11">ASCII art banner generator</text>
  
  <text x="24" y="208" fill="#bb9af7" font-size="12">  backup</text>
  <text x="160" y="208" fill="#a9b1d6" font-size="11">File/dir backup with rotation</text>
  
  <text x="24" y="226" fill="#bb9af7" font-size="12">  base64</text>
  <text x="160" y="226" fill="#a9b1d6" font-size="11">Base64 encode/decode</text>
  
  <text x="24" y="244" fill="#bb9af7" font-size="12">  crypto-price</text>
  <text x="160" y="244" fill="#a9b1d6" font-size="11">Cryptocurrency price checker</text>
  
  <text x="24" y="262" fill="#bb9af7" font-size="12">  csv-stats</text>
  <text x="160" y="262" fill="#a9b1d6" font-size="11">CSV data analysis (zero deps)</text>
  
  <text x="24" y="280" fill="#bb9af7" font-size="12">  ... and 254 more</text>
  
  <!-- Line: Prompt + command -->
  <text x="24" y="310" fill="#73daca" font-size="13">$</text>
  <text x="38" y="310" fill="#c0caf5" font-size="13"> </text>
  <text x="42" y="310" fill="#e0af68" font-size="13">evtool figlet</text>
  <text x="148" y="310" fill="#565f89" font-size="11">"hello world"</text>
  
  <!-- figlet output -->
  <text x="24" y="340" fill="#ff9e64" font-size="11" font-weight="bold"> ██   ██  ███████  ██       ██        █████           ██   ██  █████   ██████</text>
  <text x="24" y="358" fill="#ff9e64" font-size="11" font-weight="bold"> ██   ██  ██       ██       ██       ██   ██          ██   ██ ██   ██  ██   ██</text>
  <text x="24" y="376" fill="#ff9e64" font-size="11" font-weight="bold"> ███████  █████    ██       ██       ██   ██          ██ █ ██ ██   ██  █████</text>
  <text x="24" y="394" fill="#ff9e64" font-size="11" font-weight="bold"> ██   ██  ███████  ███████  ███████   █████           ██   ██  █████   ██   ██</text>
  
  <!-- Line: Prompt + command -->
  <text x="24" y="430" fill="#73daca" font-size="13">$</text>
  <text x="38" y="430" fill="#c0caf5" font-size="13"> </text>
  <text x="42" y="430" fill="#e0af68" font-size="13">evtool crypto-price</text>
  
  <text x="24" y="454" fill="#7dcfff" font-size="12">  BTC</text>
  <text x="80" y="454" fill="#a9b1d6" font-size="12">$67,432</text>
  <text x="160" y="454" fill="#73daca" font-size="12">+2.3%</text>
  <text x="24" y="474" fill="#7dcfff" font-size="12">  ETH</text>
  <text x="80" y="474" fill="#a9b1d6" font-size="12">$3,521</text>
  <text x="160" y="474" fill="#f7768e" font-size="12">-1.1%</text>
  
  <!-- Install line - highlighted -->
  <rect x="20" y="500" width="760" height="40" rx="4" fill="#3b4261" opacity="0.5"/>
  <text x="400" y="524" text-anchor="middle" fill="#7dcfff" font-size="14" font-weight="bold">pip install evolver-tools</text>
  
  <!-- Footer -->
  <text x="400" y="562" text-anchor="middle" fill="#565f89" font-size="10">evolver-dev.github.io/evolver-tools  •  github.com/evolver-dev/evolver-tools</text>
</svg>