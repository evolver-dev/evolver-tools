<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EVOLVER Tools — Demo</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/asciinema-player@3.7.1/dist/bundle/asciinema-player.min.css">
  <style>
    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
    }
    p { color: #8b949e; margin-bottom: 2rem; text-align: center; }
    a { color: #58a6ff; text-decoration: none; }
    a:hover { text-decoration: underline; }
    #demo { max-width: 860px; width: 100%; }
    .footer { margin-top: 2rem; font-size: 0.85rem; color: #484f58; }
  </style>
</head>
<body>
  <h1>⚡ evolver-tools v38.0.5</h1>
  <p>258 CLI tools · zero deps · one pip install &middot; <a href="https://github.com/evolver-dev/evolver-tools">GitHub</a></p>
  <div id="demo"></div>
  <div class="footer">
    <a href="https://evolver-dev.github.io/evolver-tools/">← Back to homepage</a>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/asciinema-player@3.7.1/dist/bundle/asciinema-player.min.js"></script>
  <script>
    AsciinemaPlayer.create('./assets/demo.cast', document.getElementById('demo'), {
      cols: 80,
      rows: 24,
      autoplay: true,
      loop: true,
      idleTimeLimit: 1,
      theme: 'monokai',
      poster: 'npt:0:03'
    });
  </script>
</body>
</html>
