function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function highlight(text, query) {
  if (!query.trim()) return escapeHtml(text);
  const words = query.toLowerCase().split(/\s+/).filter(Boolean);
  let result = escapeHtml(text);
  for (const word of words) {
    const re = new RegExp('(' + word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
    result = result.replace(re, '<mark>$1</mark>');
  }
  return result;
}

function score(tool, words) {
  const name = tool.n.toLowerCase();
  const desc = tool.d.toLowerCase();
  let s = 0;
  for (const w of words) {
    if (name === w) s += 100;
    else if (name.startsWith(w)) s += 50;
    else if (name.includes(w)) s += 30;
    if (desc.startsWith(w)) s += 10;
    else if (desc.includes(w)) s += 5;
  }
  return s;
}

function search(query) {
  const q = query.trim();
  if (!q) {
    document.getElementById('stats').textContent = TOOLS.length + ' tools';
    renderResults(TOOLS.slice(0, 50), 0, TOOLS.length, q);
    return;
  }
  const words = q.toLowerCase().split(/\s+/).filter(Boolean);
  let matched = TOOLS.map(t => ({ tool: t, score: score(t, words) }))
    .filter(x => x.score > 0)
    .sort((a, b) => b.score - a.score)
    .map(x => x.tool);
  document.getElementById('stats').textContent = matched.length + ' of ' + TOOLS.length + ' tools match';
  renderResults(matched.slice(0, 100), matched.length, TOOLS.length, q);
}

function renderResults(items, total, allCount, query) {
  const el = document.getElementById('results');
  if (items.length === 0) {
    el.innerHTML = '<div class="no-results"><div class="big">🔍</div><p>No tools match <strong>' + escapeHtml(query) + '</strong></p><p style="margin-top:0.5rem;font-size:0.85rem">Try: csv, json, network, security, crypto, text, file</p></div>';
    return;
  }
  el.innerHTML = items.map(t =>
    '<div class="result-item">' +
      '<a href="./tools/' + encodeURIComponent(t.n) + '.html">' +
        '<div class="tool-name">' + highlight(t.n, query) + '</div>' +
        '<div class="tool-desc">' + highlight(t.d, query) + '</div>' +
      '</a>' +
    '</div>'
  ).join('');
}

// Real-time search
document.getElementById('searchInput').addEventListener('input', function() {
  search(this.value);
});

// Initial render
search('');
